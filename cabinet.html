<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет — AAA Мебели</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
  --brd:#2e2e2e;--brd2:#3a3a3a;
  --t1:#f0f0f0;--t2:#b0b0b0;--t3:#707070;
  --gold:#c9a84c;--gold2:#e8c86a;--gold-bg:rgba(201,168,76,.1);
  --green:#4a9c6e;--red:#c0504a;
  --r:4px;--tr:.2s ease;
}
body{background:var(--bg);color:var(--t1);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh}

/* ═══ LOGIN ═══ */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{background:var(--bg2);border:1px solid var(--brd);padding:40px;width:340px;text-align:center}
.login-logo{font-size:1.5rem;font-weight:800;color:var(--gold);letter-spacing:3px;margin-bottom:4px}
.login-sub{color:var(--t3);font-size:.75rem;margin-bottom:28px}
.login-title{color:var(--t2);font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--brd2);color:var(--t1);padding:11px 14px;font-size:1rem;text-align:center;letter-spacing:.15em;border-radius:var(--r);margin-bottom:12px;transition:border-color var(--tr)}
.login-input:focus{outline:none;border-color:var(--gold)}
.login-btn{width:100%;padding:11px;background:var(--gold-bg);border:1px solid var(--gold);color:var(--gold);font-size:.85rem;font-weight:700;cursor:pointer;letter-spacing:.06em;border-radius:var(--r);transition:all var(--tr)}
.login-btn:hover{background:var(--gold);color:var(--bg)}
.login-err{color:var(--red);font-size:.78rem;margin-top:8px;min-height:18px}

/* ═══ CABINET ═══ */
#cabinet{display:none;flex-direction:column;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--brd);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:.95rem;font-weight:800;color:var(--gold);letter-spacing:2px}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-user{color:var(--t3);font-size:.78rem}
.logout-btn{background:none;border:1px solid var(--brd2);color:var(--t3);padding:5px 12px;cursor:pointer;font-size:.75rem;border-radius:var(--r);transition:all var(--tr)}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* TABS NAV */
.cab-nav{background:var(--bg2);border-bottom:1px solid var(--brd);padding:0 24px;display:flex;gap:0}
.cab-tab{padding:12px 20px;cursor:pointer;font-size:.82rem;font-weight:600;color:var(--t3);border-bottom:2px solid transparent;transition:all var(--tr);user-select:none}
.cab-tab:hover{color:var(--t2)}
.cab-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* CONTENT */
.cab-content{flex:1;padding:24px}
.cab-page{display:none}
.cab-page.active{display:block}

/* ═══ CALCULATOR PAGE ═══ */
.calc-frame-wrap{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;height:calc(100vh - 130px)}
.calc-frame-wrap iframe{width:100%;height:100%;border:none;display:block}

/* ═══ ORDERS PAGE ═══ */
.orders-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.orders-header h2{font-size:1rem;font-weight:700;color:var(--t1)}
.orders-actions{display:flex;gap:8px}
.btn-sm{padding:6px 14px;font-size:.75rem;font-weight:700;cursor:pointer;border-radius:var(--r);transition:all var(--tr);letter-spacing:.04em}
.btn-outline{background:none;border:1px solid var(--brd2);color:var(--t3)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:none;border:1px solid var(--brd2);color:var(--t3)}
.btn-danger:hover{border-color:var(--red);color:var(--red)}

.orders-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-box{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:14px}
.stat-val{font-size:1.6rem;font-weight:800;color:var(--gold)}
.stat-label{color:var(--t3);font-size:.72rem;margin-top:3px}

.orders-table-wrap{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);overflow:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead tr{background:var(--bg3)}
th{padding:10px 14px;text-align:left;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);white-space:nowrap;border-bottom:1px solid var(--brd)}
td{padding:10px 14px;font-size:.82rem;color:var(--t2);border-bottom:1px solid var(--brd);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
td .name{color:var(--t1);font-weight:600}
td .price{color:var(--gold);font-weight:700}
td .facade{color:var(--t2)}
td .ts{color:var(--t3);font-size:.72rem}

.badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:.68rem;font-weight:700;letter-spacing:.04em}
.badge-new{background:rgba(74,156,110,.2);color:#4a9c6e}
.badge-old{background:var(--bg3);color:var(--t3)}

.empty-state{padding:48px;text-align:center;color:var(--t3)}
.empty-state .ei{font-size:2rem;margin-bottom:8px}
.empty-state p{font-size:.85rem}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-input{background:var(--bg3);border:1px solid var(--brd2);color:var(--t1);padding:7px 12px;font-size:.82rem;border-radius:var(--r);transition:border-color var(--tr);width:220px}
.filter-input:focus{outline:none;border-color:var(--gold)}
.filter-select{background:var(--bg3);border:1px solid var(--brd2);color:var(--t2);padding:7px 12px;font-size:.82rem;border-radius:var(--r);cursor:pointer}

@media(max-width:700px){
  .orders-stats{grid-template-columns:1fr 1fr}
  .calc-frame-wrap{height:80vh}
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyCmujgnZNVUmtytCkkZk2f9RwhSRwU_ecs",
    authDomain: "aaa-mebeli.firebaseapp.com",
    projectId: "aaa-mebeli",
    storageBucket: "aaa-mebeli.firebasestorage.app",
    messagingSenderId: "75065828058",
    appId: "1:75065828058:web:0b908e805f3f8a088fbbe3"
  });
  const _db = firebase.firestore();
</script>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">AAA</div>
    <div class="login-sub">Мебели Бургас</div>
    <div class="login-title">Личный кабинет</div>
    <input class="login-input" id="pwd-input" type="password" placeholder="••••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Войти</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ═══ CABINET ═══ -->
<div id="cabinet">
  <div class="topbar">
    <div class="topbar-logo">AAA МЕБЕЛИ</div>
    <div class="topbar-right">
      <span class="topbar-user">Личный кабинет</span>
      <button class="logout-btn" onclick="doLogout()">Выйти</button>
    </div>
  </div>

  <div class="cab-nav">
    <div class="cab-tab active" data-page="orders" onclick="switchPage(this)">📋 Заявки</div>
    <div class="cab-tab" data-page="calculator" onclick="switchPage(this)">🧮 Калькулятор</div>
  </div>

  <div class="cab-content">

    <!-- ORDERS -->
    <div class="cab-page active" id="page-orders">
      <div class="orders-header">
        <h2>Заявки с сайта</h2>
        <div class="orders-actions">
          <button class="btn-sm btn-outline" onclick="exportCSV()">⬇ Экспорт CSV</button>
          <button class="btn-sm btn-danger" onclick="clearOrders()">🗑 Очистить</button>
        </div>
      </div>
      <div class="orders-stats" id="orders-stats"></div>
      <div class="filter-bar">
        <input class="filter-input" id="search-input" type="text" placeholder="Поиск по имени или телефону..." oninput="renderOrders()">
        <select class="filter-select" id="facade-filter" onchange="renderOrders()">
          <option value="">Все фасады</option>
          <option>ДСП (ПДЧ)</option>
          <option>МДФ плёнка (PVC)</option>
          <option>МДФ-пластик (HPL)</option>
          <option>МДФ-эмаль (лак)</option>
        </select>
      </div>
      <div class="orders-table-wrap">
        <div id="orders-table"></div>
      </div>
    </div>

    <!-- CALCULATOR -->
    <div class="cab-page" id="page-calculator">
      <div class="calc-frame-wrap">
        <iframe src="kalkulator.html" title="Калькулятор кухни"></iframe>
      </div>
    </div>

  </div>
</div>

<script>
// ═══ HASH ═══
const HASH = 'c775e7b757ede630cd0aa1113bd102661ab38829ca52a6422ab782862f268646'; // sha256("1234567890")

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ═══ AUTH ═══
function checkSession(){ return sessionStorage.getItem('aaa-cab')==='1'; }

async function doLogin(){
  const pwd = document.getElementById('pwd-input').value;
  if(!pwd){ showErr('Введите пароль'); return; }
  const h = await sha256(pwd);
  if(h === HASH){
    sessionStorage.setItem('aaa-cab','1');
    showCabinet();
  } else {
    showErr('Неверный пароль');
    document.getElementById('pwd-input').value='';
  }
}

function doLogout(){
  sessionStorage.removeItem('aaa-cab');
  document.getElementById('cabinet').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pwd-input').value='';
  document.getElementById('login-err').textContent='';
}

function showErr(msg){ document.getElementById('login-err').textContent=msg; }

function showCabinet(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('cabinet').style.display='flex';
  loadOrdersFromFirebase();
}

// ═══ PAGES ═══
function switchPage(tab){
  document.querySelectorAll('.cab-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.cab-page').forEach(p=>p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('page-'+tab.dataset.page).classList.add('active');
}

// ═══ ORDERS ═══
let _allOrders = [];

function loadOrdersFromFirebase(){
  _db.collection('orders').orderBy('id','desc').onSnapshot(snap => {
    _allOrders = snap.docs.map(d => d.data());
    renderOrders();
  }, err => {
    console.warn('Firebase read error:', err);
    // Резервно из localStorage
    _allOrders = JSON.parse(localStorage.getItem('aaa-orders')||'[]');
    renderOrders();
  });
}

function renderOrders(){
  const orders = _allOrders;
  const search = document.getElementById('search-input').value.toLowerCase();
  const facFilter = document.getElementById('facade-filter').value;

  // stats
  const total = orders.length;
  const today = new Date().toLocaleDateString('bg-BG');
  const todayCount = orders.filter(o=>o.timestamp && o.timestamp.startsWith(today.split('.').reverse().join('.'))||
    (o.timestamp && o.timestamp.includes(new Date().getDate()+'.'+String(new Date().getMonth()+1)))).length;

  document.getElementById('orders-stats').innerHTML = `
    <div class="stat-box"><div class="stat-val">${total}</div><div class="stat-label">Всего заявок</div></div>
    <div class="stat-box"><div class="stat-val">${todayCount}</div><div class="stat-label">Сегодня</div></div>
    <div class="stat-box"><div class="stat-val">${orders.filter(o=>o.facade&&o.facade.includes('МДФ')).length}</div><div class="stat-label">МДФ фасады</div></div>
    <div class="stat-box"><div class="stat-val">${orders.filter(o=>o.facade&&o.facade.includes('ДСП')).length}</div><div class="stat-label">ДСП фасады</div></div>
  `;

  // filter
  let filtered = orders.filter(o=>{
    const matchSearch = !search ||
      (o.name&&o.name.toLowerCase().includes(search)) ||
      (o.phone&&o.phone.includes(search));
    const matchFacade = !facFilter || (o.facade&&o.facade.includes(facFilter.split(' ')[0]));
    return matchSearch && matchFacade;
  });

  if(filtered.length===0){
    document.getElementById('orders-table').innerHTML =
      '<div class="empty-state"><div class="ei">📭</div><p>'+(total===0?'Заявок пока нет. Они появятся здесь после отправки формы на сайте.':'Ничего не найдено по фильтру.')+'</p></div>';
    return;
  }

  const now = Date.now();
  let rows = filtered.map((o,i)=>{
    const isNew = o.id && (now - o.id) < 86400000;
    return `<tr>
      <td><span class="badge ${isNew?'badge-new':'badge-old'}">${isNew?'новая':'архив'}</span></td>
      <td><span class="name">${esc(o.name||'—')}</span></td>
      <td>${esc(o.phone||'—')}</td>
      <td class="facade">${esc(o.facade||'—')}</td>
      <td>${esc(o.length||'—')}</td>
      <td>${esc(o.color||'—')}</td>
      <td>${esc(o.extras||'—')}</td>
      <td class="price">${esc(o.price_total||'—')}</td>
      <td class="ts">${esc(o.timestamp||'—')}</td>
    </tr>`;
  }).join('');

  document.getElementById('orders-table').innerHTML = `
    <table>
      <thead><tr>
        <th></th><th>Имя</th><th>Телефон</th><th>Фасады</th>
        <th>Длина</th><th>Цвет</th><th>Допол.</th><th>Цена</th><th>Дата</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function clearOrders(){
  if(!confirm('Удалить все заявки? Это действие нельзя отменить.')) return;
  // Удаляем из Firebase
  const snap = await _db.collection('orders').get();
  const batch = _db.batch();
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
  // Удаляем из localStorage
  localStorage.removeItem('aaa-orders');
  _allOrders = [];
  renderOrders();
}

function exportCSV(){
  const orders = _allOrders;
  if(!orders.length){ alert('Нет заявок для экспорта'); return; }
  const header = ['Статус','Имя','Телефон','Фасады','Длина','Цвет','Допол.','Цена','Дата'];
  const rows = orders.map(o=>[
    'ok', o.name||'', o.phone||'', o.facade||'', o.length||'',
    o.color||'', o.extras||'', o.price_total||'', o.timestamp||''
  ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv = '\uFEFF'+header.join(',')+'\n'+rows.join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = 'zaявки_AAA_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

// ═══ INIT ═══
if(checkSession()) showCabinet();
</script>
</body>
</html>
